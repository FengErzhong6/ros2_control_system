controller_manager:
  ros__parameters:
    update_rate: 1000  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    tracker_teleop_controller:
      type: marvin_system/TrackerTeleopController

tracker_teleop_controller:
  ros__parameters:
    # ── 基础资源 ───────────────────────────────────────────────────────────
    joints:
      - Joint1_L
      - Joint2_L
      - Joint3_L
      - Joint4_L
      - Joint5_L
      - Joint6_L
      - Joint7_L
      - Joint1_R
      - Joint2_R
      - Joint3_R
      - Joint4_R
      - Joint5_R
      - Joint6_R
      - Joint7_R
    kine_config_path: ""  # set by launch file via FindPackageShare

    # ── Tracker 输入源 ────────────────────────────────────────────────────
    # TF frame names published by tracker_publisher.
    # Must match the frame_ids in trackers.yaml.
    tracker_frames:
      torso: "tracker_torso"
      left_hand: "tracker_left_hand"
      right_hand: "tracker_right_hand"
      left_upper_arm: "tracker_left_upper_arm"
      right_upper_arm: "tracker_right_upper_arm"
    tracker_timeout_sec: 0.1  # tracker 输入超时后进入 hold，停止追踪旧目标

    # ── Tracker 输入抗抖 ──────────────────────────────────────────────────
    tracker_deadband:
      enabled: true
      position_enter_m: 0.002  # 进入静止区阈值；更小的末端平移不触发重算
      position_exit_m: 0.004   # 退出静止区阈值；超过后恢复跟踪
      orientation_enter_deg: 1.0
      orientation_exit_deg: 2.0
      elbow_enter_deg: 3.0
      elbow_exit_deg: 5.0

    startup_sync:
      enabled: true
      position_tolerance_m: 0.03  # 启用后先保持当前姿态，直到 tracker 靠近这个范围再接管
      orientation_tolerance_deg: 12.0
      elbow_tolerance_deg: 20.0

    elbow_dir_filter:
      alpha: 0.25  # shoulder_v_elbow EMA 系数，越大响应越快
      deadband_deg: 2.0  # 小角度抖动直接保持上一帧
      hold_last_on_invalid: true  # upper_arm TF 短时失效时沿用上一帧稳定肘向
    default_elbow_direction: [0.0, 0.0, -1.0]  # 无上臂 TF 时的默认 shoulder_v_elbow

    # ── 目标映射 / 末端跟踪 ───────────────────────────────────────────────
    base_frame: "base_link"
    enable_orientation: true   # 是否跟踪手腕姿态
    position_scale: 1.0        # chest_T_wrist 平移缩放因子
    base_x_scale: 1.0          # 基座 x 方向缩放因子

    # ── IK 求解参数 ──────────────────────────────────────────────────────
    j4_bound: -3.59  # 机械臂肘部 A/B 构型分界线，仅用于日志输出
    dh_d1: 0.1745    # link1 长度 (m)，shoulder→base 偏置 [0, 0, +d1]
    tracking_ik:
      # 末端容差与 psi 搜索窗口
      fk_accept_tol: 1.0e-3
      fine_psi_range_deg: 2.0
      fine_psi_step_deg: 0.1
      fast_psi_range_deg: 12.0
      fast_psi_step_deg: 0.5
      expand_psi_range_deg: 36.0
      expand_psi_step_deg: 2.0

      # 候选解评分权重
      score:
        desired_dir_weight: 0.06
        continuity_dir_weight: 0.05
        magnitude_weight: 0.05
        psi_delta_weight: 0.00
        branch_switch_penalty: 20.0

    # ── 输出平滑 / 限速 ──────────────────────────────────────────────────
    smoothing_alpha: 0.8       # 低通滤波系数 (0, 1]，越大响应越快
    max_joint_velocity: 2.0    # 最大关节速度 (rad/s)

    # ── Home / 回零 ─────────────────────────────────────────────────────
    home_joint_positions:
      left: [1.16, -1.28, -1.5707963, -1.25, 0.0, 0.0, 0.0]
      right: [-1.16, -1.28, 1.5707963, -1.25, 0.0, 0.0, 0.0]
    home_tolerance_deg: 0.5

    # ── 可视化 ───────────────────────────────────────────────────────────
    viz_base_frames: ["Base_L", "Base_R"]  # 可视化 marker 使用的左/右臂 base frame

    # ── 空间坐标变换 / 标定参数 ───────────────────────────────────────────
    # 肘向量方向修正 [roll, pitch, yaw] (deg)，在 shoulder 系下对 elbow 方向施加旋转
    elbow_direction_correction:
      left:  [0.0, 0.0, 0.0]
      right: [0.0, 0.0, 0.0]

    # ── 刚体变换 (position [x,y,z] + orientation [qx,qy,qz,qw])，均为 ROS 系 ──
    #
    # chest_T_wrist = TF(torso→hand)；chest_T_arm = TF(torso→upper_arm)
    # shoulder_T_wrist  = shoulder_T_chest × chest_T_wrist
    # shoulder_T_ee     = shoulder_T_wrist × wrist_T_ee
    # base_T_ee         = shoulder_T_ee + [0, 0, dh_d1]  → 传入 IK
    # shoulder_v_elbow  = shoulder_R_arm_robot 的第 2 列（Y 轴）
    # shoulder_R_arm_robot = shoulder_R_chest × chest_R_arm × arm_human_R_arm_robot
    #
    # shoulder_T_chest          : {chest} → {shoulder}
    # wrist_T_ee                : {wrist_human} → {ee/TCP}
    # arm_human_T_arm_robot     : {arm_human} → {arm_robot}（肘向参考，仅旋转参与）
    shoulder_T_chest:
      left:
        position:    [0.0, 0.38, -0.2]  # chest原点在shoulder坐标系下的位置
        orientation: [0.7071, 0.0, 0.0, 0.7071]
      right:
        position:    [0.0, -0.38, -0.2]
        orientation: [-0.7071, 0.0, 0.0, 0.7071]

    wrist_T_ee:
      left:
        position:    [0.0, 0.0, 0.0]
        orientation: [0.7071, 0.0, 0.0, 0.7071]
      right:
        position:    [0.0, 0.0, 0.0]
        orientation: [-0.7071, 0.0, 0.0, 0.7071]

    arm_human_T_arm_robot:
      left:
        position:    [0.0, 0.0, 0.0]
        orientation: [-0.5, 0.5, -0.5, 0.5]
      right:
        position:    [0.0, 0.0, 0.0]
        orientation: [-0.5, -0.5, 0.5, 0.5]
